<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Suma PRO</title>

<link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">

<style>
/* 🔥 BOTÓN VOLVER PRO */
.btn-volver-top {
    position: absolute;
    top: 20px;
    left: 20px;
    padding: 10px 18px;
    border-radius: 20px;
    text-decoration: none;
    color: white;
    font-weight: bold;
    font-size: 14px;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(168,85,247,0.5);
    box-shadow:
        0 0 10px rgba(168,85,247,0.5),
        0 0 20px rgba(168,85,247,0.3);
    transition: all 0.3s ease;
}

.btn-volver-top:hover {
    background: rgba(168,85,247,0.2);
    transform: translateY(-3px) scale(1.05);
    box-shadow:
        0 0 15px rgba(168,85,247,0.8),
        0 0 30px rgba(168,85,247,0.6);
}

.btn-volver-top:active {
    transform: scale(0.95);
}

/* 🎤 BOTÓN MICRO */
.btn-micro {
    padding: 10px 12px;
    border-radius: 50%;
    border: none;
    cursor: pointer;
    font-size: 18px;

    background: rgba(255,255,255,0.1);
    color: white;

    box-shadow: 0 0 10px rgba(168,85,247,0.4);
    transition: all 0.2s ease;
}

.btn-micro:hover {
    transform: scale(1.1);
}

.btn-micro.activo {
    background: #a855f7;
    box-shadow:
        0 0 15px #a855f7,
        0 0 30px #a855f7;
}
</style>

</head>

<body>

<div class="fondo-animado"></div>

<!-- 🔙 BOTÓN -->
<a href="/operaciones" class="btn-volver-top">⬅ Volver</a>

<h1 class="titulo-suma">Sumas ➕</h1>

<div class="robot">🤖</div>

<!-- 🔥 CONTENEDOR -->
<div class="contenedor-suma">

    <!-- 🧠 IZQUIERDA -->
    <div class="lado izquierda">

        <h2>🤖 Presentación</h2>

        <div id="asistente" class="mensaje-asistente"></div>

        <div class="card-ejemplo">
            <strong>Ejemplo:</strong>
            <br>
            2 + 3 = 5
            <br><br>

            <div class="manzanas">
                Tengo 2 manzanas + agrego 3 manzanas = tengo 5 manzanas
                <br><br>
                🍎🍎 + 🍎🍎🍎 = 🍎🍎🍎🍎🍎
            </div>
        </div>

    </div>

    <!-- 🎮 DERECHA -->
    <div class="lado derecha">

        <h2>🎮 Ejercicios</h2>

        <div class="card-ejercicio">

            <p class="texto-arriba">Resuelve:</p>

            <p id="pregunta" class="pregunta"></p>

            <!-- INPUT + MICRO -->
            <div style="display:flex; gap:10px; align-items:center; justify-content:center;">

                <input type="number" id="respuesta" placeholder="Tu respuesta">

                <button onclick="iniciarVoz()" class="btn-micro">
                    🎤
                </button>

            </div>

            <button onclick="verificar()" class="btn-responder">
                Responder
            </button>

            <p id="resultado"></p>
            <p id="explicacion-error" class="explicacion"></p>

        </div>

        <!-- ⭐ PROGRESO -->
        <div class="progreso-box">
            <p>Tu progreso</p>
            <span id="estrellas">☆☆☆☆☆</span>
        </div>

    </div>

</div>

<script src="{{ url_for('static', filename='sumaIA.js') }}"></script>

</body>
</html>
