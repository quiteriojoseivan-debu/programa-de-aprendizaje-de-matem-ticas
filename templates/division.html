<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>División</title>

<link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">

<style>
/* 🔥 BOTÓN VOLVER PRO (INCRUSTADO) */
.btn-volver-top {
    position: absolute;
    top: 20px;
    left: 20px;

    padding: 10px 18px;
    border-radius: 20px;

    text-decoration: none;
    color: white;
    font-weight: bold;
    font-size: 14px;

    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(10px);

    border: 1px solid rgba(168,85,247,0.5);

    box-shadow:
        0 0 10px rgba(168,85,247,0.5),
        0 0 20px rgba(168,85,247,0.3);

    transition: all 0.3s ease;
}

.btn-volver-top:hover {
    background: rgba(168,85,247,0.2);
    transform: translateY(-3px) scale(1.05);
    box-shadow:
        0 0 15px rgba(168,85,247,0.8),
        0 0 30px rgba(168,85,247,0.6);
}

.btn-volver-top:active {
    transform: scale(0.95);
}
</style>

</head>

<body>

<div class="fondo-animado"></div>

<a href="/operaciones" class="btn-volver-top">⬅ Volver</a>

<h1 class="titulo-div">División ➗</h1>

<div class="robot">🤖</div>

<div class="contenedor-suma contenedor-div">

    <!-- IZQUIERDA -->
    <div class="lado izquierda">

        <h2>🤖 Presentación</h2>

        <div id="asistente" class="mensaje-asistente"></div>

        <div class="card-ejemplo">
            <strong>Ejemplo:</strong>
            <br>
            6 ÷ 2 = 3
            <br><br>

            <div class="manzanas">
                Repartimos 6 manzanas en 2 grupos
                <br><br>
                🍎🍎🍎 | 🍎🍎🍎
                <br><br>
                Cada grupo tiene 3
            </div>
        </div>

    </div>

    <!-- DERECHA -->
    <div class="lado derecha">

        <h2>🎮 Ejercicios</h2>

        <div class="card-ejercicio">

            <p class="texto-arriba">Resuelve:</p>

            <p id="pregunta" class="pregunta"></p>

            <input type="number" id="respuesta" placeholder="Tu respuesta">

            <button onclick="verificar()" class="btn-responder">
                Responder
            </button>

            <p id="resultado"></p>
            <p id="explicacion-error" class="explicacion"></p>

        </div>

        <div class="progreso-box">
            <p>Tu progreso</p>
            <span id="estrellas">☆☆☆☆☆</span>
        </div>

    </div>

</div>

<script src="{{ url_for('static', filename='divIA.js') }}"></script>

</body>
</html>
